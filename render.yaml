# ═══════════════════════════════════════════════════
# Render.com Auto-Deploy Configuration
# ═══════════════════════════════════════════════════

services:
  - type: web
    name: pathpilot-api
    runtime: docker
    plan: free
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CACHE_TTL
        value: "3600"
      - key: MAX_RETRIES
        value: "3"
    healthCheckPath: /health
